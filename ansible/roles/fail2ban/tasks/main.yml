---
- name: Install fail2ban
  apt:
    name: "fail2ban"
    state: latest
  notify:
    - restart fail2ban

- name: Set fail2ban config
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: /etc/fail2ban/{{ item }}
    mode: '0644'
  with_items:
    - jail.local
  notify:
    - restart fail2ban

- name: Ensure fail2ban starts on a fresh reboot
  service:
    name: fail2ban
    state: started
    enabled: yes
